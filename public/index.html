<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>오늘 뭐 먹지?</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <meta name="theme-color" content="#f59e0b" />
        <link
            rel="stylesheet"
            as="style"
            crossorigin
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
        />
        <link rel="stylesheet" href="/style.css" />
        <script>
            (function () {
                var t = localStorage.getItem('theme');
                if (t !== 'light' && t !== 'dark') {
                    t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', t);
            })();
        </script>
    </head>
    <body>
        <button id="theme-toggle" type="button"></button>
        <main>
            <h1>오늘 뭐 먹지?</h1>

            <section class="recommend">
  <div class="recommend-actions">
    <button id="category-random-btn" type="button" class="recommend-btn">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z" />
        <circle cx="7.5" cy="7.5" r=".5" fill="currentColor" />
      </svg>
      <span>메뉴 뽑기</span>
    </button>
    <button id="random-btn" type="button" class="recommend-btn">
      <svg
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7" />
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
        <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4" />
        <path d="M2 7h20" />
        <path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7" />
      </svg>
      <span>식당 뽑기</span>
    </button>
  </div>
  <p id="recommend-scope" class="recommend-scope" hidden></p>
  <p id="random-result" aria-live="polite"></p>
            </section>

            <form id="add-form">
                <input id="name" type="text" placeholder="식당 이름" required />
                <input id="description" type="text" placeholder="메뉴 (예: 갈비덮밥)" />
                <button type="submit">추가</button>
            </form>

            <div class="filter-bar">
                <div id="category-filter-wrap" hidden>
                  <select id="category-filter" aria-label="음식 카테고리 선택">
                    <option value="">전체</option>
                  </select>
                </div>

                <div id="search-wrap" hidden>
                    <input id="search" type="search" placeholder="식당·메뉴 검색" autocomplete="off" aria-label="식당·메뉴 검색" />
                </div>
            </div>

            <ul id="menu-list"></ul>
        </main>
        <div id="toast-container" aria-live="polite"></div>
        <script type="module" src="/app.js"></script>
    </body>
</html>
